# 1. مقدمة

منذ أرسطو، قُسمت الفلسفة الطبيعية إلى بحث في المبادئ والأسباب، وفي الحركة واللانهاية، وفي المكان والزمان. هذه الأسئلة ظلت حاضرة في صميم التفكير العلمي حتى اليوم.

## 1.1 إشكالية الوجود

لطالما شكل سؤال "ما الوجود؟" لبّ التفكير الفلسفي. في نظام 𝕊، نجيب انطلاقاً من ثلاثية:  
❶ (المطلق)، 0ₚ (الإمكان)، ∞ (العلاقة).

**المعادلة المركزية:**  
$$❶ \oplus 0ₚ = ① = ∞$$

---

## 2. التراكب الكمومي

$$|\psi\rangle = \sum_i c_i |\phi_i\rangle \quad \longleftrightarrow \quad 0ₚ = \lim_{\epsilon \to 0^+} \epsilon \cdot \infty$$

الإنتروبيا المعلوماتية:  
$$S_{\text{info}} = -\sum_i |c_i|^2 \log |c_i|^2$$

---

## 3. الجاذبية في نظام 𝕊

$$G_{\mu\nu} = 8\pi G T_{\mu\nu} + \beta(\tau) \nabla_\mu \nabla_\nu \tau$$

---

graph TD
    A["❶ المطلق"] -->|ε| B["0ₚ الإمكان"]
    B -->|δ| C["∞ العلاقة"]
    C -->|η| D["① = ∞"]
```

---

4. ثابت التجلي البوكري

\mathcal{CB} = \frac{2}{43} \cdot \frac{\alpha}{137} \cdot \sqrt{\frac{c^3}{\hbar G}} = 6.184033 \times 10^{-42}

<div class="overlay" id="overlay"></div>
<div class="calculator-modal" id="calculator">
    <div class="calc-header">
        <span>آلة حاسبة علمية</span>
        <button id="closeCalc" style="background:none; border:none; font-size:1.5rem;">&times;</button>
    </div>
    <div class="calc-screen" id="calcScreen">0</div>
    <div class="calc-buttons">
        <button class="clear" onclick="clearCalc()">C</button>
        <button onclick="appendCalc('(')">(</button>
        <button onclick="appendCalc(')')">)</button>
        <button onclick="appendCalc('^')">^</button>
        <button class="operator" onclick="appendCalc('/')">÷</button>

</div>

<script>
    // تهيئة Mermaid
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    // عناصر الصفحة
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const toggleEditBtn = document.getElementById('toggleEditMode');
    const editorPane = document.getElementById('editorPane');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const newBtn = document.getElementById('newBtn');
    const openCalcBtn = document.getElementById('openCalcBtn');
    const calculator = document.getElementById('calculator');
    const overlay = document.getElementById('overlay');
    const closeCalc = document.getElementById('closeCalc');
    const calcScreen = document.getElementById('calcScreen');
    const insertMathBtn = document.getElementById('insertMathBtn');
    const exportHtmlBtn = document.getElementById('exportHtmlBtn');
    const exportMarkdownBtn = document.getElementById('exportMarkdownBtn');
    const themeSelect = document.getElementById('themeSelect');

    // متغيرات الحالة
    let currentExpression = '';
    let editMode = true; // true: يظهر المحرر، false: يظهر فقط المعاينة (وضع القراءة)

    // تحديث المعاينة
    function renderPreview() {
        let markdownText = editor.value;
        // تحويل Markdown إلى HTML باستخدام marked
        let html = marked.parse(markdownText, { breaks: true, langPrefix: 'language-' });
        preview.innerHTML = html;

        // معالجة رسوم Mermaid البيانية
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));

        // إعادة تشغيل MathJax
        if (window.MathJax) {
            MathJax.typesetPromise().catch(err => console.log(err));
        }

        // تحديث عدد الكلمات
        let words = markdownText.trim().split(/\s+/).filter(w => w.length > 0).length;
        document.getElementById('wordCount').innerText = words + ' كلمة';
    }

    // أحداث التحرير
    editor.addEventListener('input', renderPreview);

    // تبديل وضع التحرير
    toggleEditBtn.addEventListener('click', function() {
        editMode = !editMode;
        if (editMode) {
            editorPane.style.display = 'flex';
            toggleEditBtn.classList.add('active');
            toggleEditBtn.innerHTML = '<i class="fas fa-edit"></i> وضع التحرير';
        } else {
            editorPane.style.display = 'none';
            toggleEditBtn.classList.remove('active');
            toggleEditBtn.innerHTML = '<i class="fas fa-eye"></i> وضع القراءة';
        }
    });

    // حفظ في localStorage
    saveBtn.addEventListener('click', function() {
        localStorage.setItem('bouker_draft', editor.value);
        alert('تم الحفظ محلياً');
    });

    // تحميل من localStorage
    loadBtn.addEventListener('click', function() {
        let saved = localStorage.getItem('bouker_draft');
        if (saved) {
            editor.value = saved;
            renderPreview();
        } else {
            alert('لا يوجد نص محفوظ');
        }
    });

    // مستند جديد (نص افتراضي)
    newBtn.addEventListener('click', function() {
        editor.value = '# عنوان جديد\n\nاكتب محتواك هنا...';
        renderPreview();
    });

    // فتح/غلق الحاسبة
    openCalcBtn.addEventListener('click', function() {
        calculator.classList.add('active');
        overlay.classList.add('active');
    });
    closeCalc.addEventListener('click', closeCalculator);
    overlay.addEventListener('click', closeCalculator);
    function closeCalculator() {
        calculator.classList.remove('active');
        overlay.classList.remove('active');
    }

    // دوال الحاسبة
    function appendCalc(val) {
        currentExpression += val;
        calcScreen.innerText = currentExpression;
    }
    function clearCalc() {
        currentExpression = '';
        calcScreen.innerText = '0';
    }
    function calculateResult() {
        try {
            // استخدام math.js للتقييم الآمن
            let result = math.evaluate(currentExpression);
            calcScreen.innerText = result;
            currentExpression = result.toString();
        } catch (e) {
            calcScreen.innerText = 'خطأ';
            currentExpression = '';
        }
    }
    function calcSqrt() {
        appendCalc('sqrt(');
    }
    function calcSin() {
        appendCalc('sin(');
    }
    // إدراج النتيجة في المحرر
    function insertResultIntoEditor() {
        if (currentExpression !== '') {
            editor.value += ' ' + currentExpression + ' ';
            renderPreview();
            closeCalculator();
        }
    }
    // ربط الأزرار
    window.appendCalc = appendCalc;
    window.clearCalc = clearCalc;
    window.calculateResult = calculateResult;
    window.calcSqrt = calcSqrt;
    window.calcSin = calcSin;
    window.insertResultIntoEditor = insertResultIntoEditor;

    // إدراج معادلة LaTeX بسيطة
    insertMathBtn.addEventListener('click', function() {
        let start = editor.selectionStart;
        let end = editor.selectionEnd;
        let text = editor.value;
        let selected = text.substring(start, end);
        let newText = text.substring(0, start) + '$$' + selected + '$$' + text.substring(end);
        editor.value = newText;
        editor.focus();
        renderPreview();
    });

    // تصدير HTML
    exportHtmlBtn.addEventListener('click', function() {
        let htmlContent = preview.innerHTML;
        let fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>تصدير</title><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"><style>body { font-family: 'Cairo', sans-serif; direction: rtl; padding: 2rem; } .math { direction: ltr; }</style><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"><\/script></head><body>${htmlContent}</body></html>`;

</script>

<!-- بعض الأزرار الإضافية لتحسين تجربة تحرير المعادلات والجداول -->

<div style="position:fixed; bottom:20px; left:20px; z-index:3000;">
    <button id="quickMathBtn" style="background:#9C27B0; color:white; border:none; border-radius:50px; padding:15px 20px; box-shadow:0 4px 10px rgba(0,0,0,0.3);"><i class="fas fa-square-root-alt"></i> إدراج معادلة</button>
</div>
<script>
    document.getElementById('quickMathBtn').addEventListener('click', function() {
        let eq = prompt('أدخل معادلة LaTeX:', 'E = mc^2');
        if (eq) {
            editor.value += ' $$' + eq + '$$ ';
            renderPreview();
        }
    });
</script>
